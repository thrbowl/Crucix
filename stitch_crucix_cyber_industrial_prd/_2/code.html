<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CRUCIX | 注册账号</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00e5ff",
                        "primary-hover": "#00c4db",
                        background: "#0B0E14",
                        surface: "rgba(20, 25, 35, 0.4)",
                        "surface-input": "rgba(15, 20, 30, 0.6)",
                        border: "rgba(255, 255, 255, 0.08)",
                        "border-focus": "rgba(0, 229, 255, 0.5)",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(20, 25, 35, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-gray-200 font-sans selection:bg-primary/30 selection:text-white overflow-hidden min-h-screen flex flex-col">
<!-- Background Layer (Subtle Radial Gradient) -->
<div class="fixed inset-0 z-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-[#0B0E14] to-[#05070a]"></div>
<!-- TopNavBar -->
<nav class="flex justify-between items-center px-6 h-16 w-full fixed top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-md border-b border-white/5">
<div class="flex items-center gap-8">
<span class="text-2xl font-black italic tracking-tighter text-primary">CRUCIX</span>
<div class="hidden md:flex gap-6 tracking-tight text-sm items-center">
<span class="text-slate-400 hover:text-white transition-colors duration-300 cursor-pointer">情报中心</span>
<span class="text-slate-400 hover:text-white transition-colors duration-300 cursor-pointer">神经网络</span>
</div>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400 hover:text-white transition-colors cursor-pointer">toll</span>
<span class="material-symbols-outlined text-slate-400 hover:text-white transition-colors cursor-pointer">notifications</span>
<button class="bg-primary text-black px-4 py-1.5 rounded-md text-sm font-medium hover:bg-primary-hover transition-colors">
                登录
            </button>
</div>
</nav>
<!-- Registration Canvas -->
<main class="relative z-10 w-full flex-grow flex items-center justify-center p-6 mt-16">
<!-- Registration Card -->
<div class="w-full max-w-md glass-panel rounded-2xl flex flex-col p-8 sm:p-10">
<!-- Card Header -->
<div class="mb-8 text-center">
<h1 class="text-2xl font-semibold text-white tracking-wide">注册账号</h1>
</div>
<!-- Form Content -->
<div class="space-y-5">
<!-- Admin Email -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-400 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">alternate_email</span>
                        邮箱地址
                    </label>
<input class="w-full bg-surface-input border border-border text-white px-4 py-3 rounded-lg focus:ring-0 focus:border-border-focus outline-none transition-colors placeholder:text-slate-600" placeholder="admin@crucix.sys" type="email"/>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-400 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">key</span>
                        设置密码
                    </label>
<input class="w-full bg-surface-input border border-border text-white px-4 py-3 rounded-lg focus:ring-0 focus:border-border-focus outline-none transition-colors placeholder:text-slate-600" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-400 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">lock_reset</span>
                        确认密码
                    </label>
<input class="w-full bg-surface-input border border-border text-white px-4 py-3 rounded-lg focus:ring-0 focus:border-border-focus outline-none transition-colors placeholder:text-slate-600" placeholder="••••••••" type="password"/>
</div>
<!-- Action Area -->
<div class="pt-4 flex flex-col gap-5">
<button class="w-full bg-primary text-black font-semibold py-3.5 rounded-lg flex items-center justify-center gap-2 hover:bg-primary-hover transition-colors shadow-[0_0_15px_rgba(0,229,255,0.15)] hover:shadow-[0_0_20px_rgba(0,229,255,0.3)]">
                        立即注册
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded bg-surface-input border-border text-primary focus:ring-0 focus:ring-offset-0" type="checkbox"/>
<span class="text-xs text-slate-400 group-hover:text-slate-300 transition-colors">同意服务条款与通信协议</span>
</label>
<a class="text-xs text-primary hover:text-primary-hover transition-colors" href="#">已有账号？直接登录</a>
</div>
</div>
</div>
</div>
</main>
</body></html>
