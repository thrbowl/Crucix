<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crucix Intelligence Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      background: #0b0f17;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 48px;
      border: 1px solid #1e293b;
      border-radius: 8px;
      max-width: 480px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    p  { color: #64748b; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: #1e293b;
      color: #38bdf8;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 4px;
      font-family: monospace;
    }
    a { color: #38bdf8; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Crucix Intelligence Platform</h1>
    <p>New dashboard under construction.<br />
       Intelligence API is available at <a href="/api/data">/api/data</a>
       and <a href="/api/health">/api/health</a>.</p>
    <span class="badge">v2.0 — SaaS Edition</span>
  </div>
</body>
</html>
