<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIX — Cybersecurity Intelligence Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.33.0"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--panel:rgba(12,12,20,0.92);--glass:rgba(14,14,24,0.75);
  --border:rgba(0,229,255,0.12);--border-bright:rgba(0,229,255,0.35);
  --text:#e0e6ed;--dim:#5a6a7a;--accent:#00e5ff;--red:#ff1744;
  --orange:#ff6d00;--yellow:#ffc107;--green:#00e676;--purple:#aa00ff;
  --darkred:#b71c1c;--blue:#2979ff;
  --mono:'JetBrains Mono','Fira Code',monospace;--sans:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}

/* Background effects */
.bg-grid{position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);
  background-size:40px 40px;opacity:0.5}
.scanline{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9999;opacity:0.3}
.scanline::after{content:'';position:absolute;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.08),transparent);animation:scanMove 6s linear infinite}
@keyframes scanMove{0%{top:-2px}100%{top:100%}}

/* Boot screen */
#boot{position:fixed;inset:0;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.boot-logo{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:0.3em;color:var(--accent);opacity:0;text-shadow:0 0 30px rgba(0,229,255,0.4)}
#bootLines{margin-top:24px;font-family:var(--mono);font-size:11px;color:var(--dim);text-align:left;line-height:2;min-width:380px;opacity:0}
#bootLines .ok{color:var(--green)}
#bootLines .warn{color:var(--yellow)}
#bootLines .fail{color:var(--red)}
#bootFinal{margin-top:20px;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:0.15em;opacity:0}

/* Main layout */
#main{opacity:0;display:grid;grid-template-rows:60px 1fr 300px;grid-template-columns:250px 1fr 350px;height:100vh;gap:1px;background:rgba(0,229,255,0.04)}

/* Top bar */
.topbar{grid-column:1/-1;display:flex;align-items:center;padding:0 16px;gap:12px;background:var(--panel);border-bottom:1px solid var(--border);overflow:hidden}
.threat-index{display:flex;align-items:center;gap:8px;padding:0 14px;height:100%;border-right:1px solid var(--border)}
.threat-index .ti-label{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim)}
.threat-index .ti-value{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1}
.threat-index .ti-dir{font-family:var(--mono);font-size:11px;margin-left:4px}
.stat-pill{display:flex;flex-direction:column;align-items:center;padding:0 12px;height:100%;justify-content:center;border-right:1px solid rgba(255,255,255,0.04)}
.stat-pill .sp-val{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text)}
.stat-pill .sp-label{font-family:var(--mono);font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);white-space:nowrap}
.top-spacer{flex:1}
.region-select{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;padding:6px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);cursor:pointer;text-transform:uppercase}
.region-select:focus{outline:none;border-color:var(--accent)}
.region-select option{background:#0a0a0f;color:var(--text)}
.meta-ts{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:0.06em;white-space:nowrap}
.brand{font-family:var(--mono);font-weight:700;font-size:14px;letter-spacing:0.14em;color:var(--accent);text-transform:uppercase;padding-right:14px;border-right:1px solid var(--border);white-space:nowrap}

/* Left sidebar */
.sidebar-left{grid-row:2/4;display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:8px}
.sidebar-left::-webkit-scrollbar{width:3px}
.sidebar-left::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15);border-radius:2px}
.sidebar-left h4{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);padding:8px 4px 6px;border-bottom:1px solid rgba(255,255,255,0.04)}
.layer-item{display:flex;align-items:center;gap:8px;padding:7px 6px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s}
.layer-item:hover{background:rgba(0,229,255,0.04)}
.layer-item.off{opacity:0.35}
.layer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.layer-info{flex:1;min-width:0}
.layer-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.layer-count{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);flex-shrink:0}
.layer-toggle{width:32px;height:16px;border-radius:8px;background:rgba(255,255,255,0.08);position:relative;flex-shrink:0;transition:background 0.2s}
.layer-toggle.on{background:rgba(0,229,255,0.25)}
.layer-toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--dim);transition:all 0.2s}
.layer-toggle.on::after{left:18px;background:var(--accent)}

/* Source health */
.health-section{margin-top:auto;padding-top:8px;border-top:1px solid var(--border)}
.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:4px 0}
.health-item{font-family:var(--mono);font-size:9px;padding:3px 4px;display:flex;align-items:center;gap:4px;letter-spacing:0.04em}
.health-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.health-dot.ok{background:var(--green)}
.health-dot.err{background:var(--red)}
.health-dot.stale{background:var(--yellow)}

/* Center: globe */
.center-area{position:relative;overflow:hidden;background:radial-gradient(ellipse at center,rgba(8,8,18,1),rgba(6,6,12,1))}
#globeViz{width:100%;height:100%;cursor:grab}
#globeViz:active{cursor:grabbing}
#globeViz canvas{outline:none}
.globe-legend{position:absolute;bottom:8px;left:10px;display:flex;gap:10px;font-family:var(--mono);font-size:9px;color:var(--dim);z-index:5;flex-wrap:wrap;letter-spacing:0.04em}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:7px;height:7px;border-radius:50%}
.globe-stats{position:absolute;top:8px;left:10px;font-family:var(--mono);font-size:9px;color:var(--dim);z-index:5;letter-spacing:0.06em}

/* Right sidebar: intel feed */
.sidebar-right{grid-row:2/4;display:flex;flex-direction:column;background:var(--panel);border-left:1px solid var(--border)}
.feed-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.feed-header h3{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim)}
.feed-count{font-family:var(--mono);font-size:10px;color:var(--accent);padding:2px 8px;border:1px solid var(--border)}
#feedList{flex:1;overflow-y:auto;padding:4px}
#feedList::-webkit-scrollbar{width:3px}
#feedList::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.12);border-radius:2px}
.feed-item{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:default;transition:background 0.15s}
.feed-item:hover{background:rgba(0,229,255,0.03)}
.feed-item.critical{border-left:2px solid var(--red);animation:critPulse 2s ease-in-out infinite}
.feed-item.high{border-left:2px solid var(--orange)}
.feed-item.medium{border-left:2px solid var(--yellow)}
.feed-item.low{border-left:2px solid var(--green)}
@keyframes critPulse{0%,100%{box-shadow:inset 0 0 0 transparent}50%{box-shadow:inset 0 0 12px rgba(255,23,68,0.08)}}
.feed-level{display:inline-block;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;padding:1px 5px;margin-right:6px;text-transform:uppercase}
.feed-level.critical{background:rgba(255,23,68,0.2);color:var(--red);border:1px solid rgba(255,23,68,0.3)}
.feed-level.high{background:rgba(255,109,0,0.15);color:var(--orange);border:1px solid rgba(255,109,0,0.3)}
.feed-level.medium{background:rgba(255,193,7,0.12);color:var(--yellow);border:1px solid rgba(255,193,7,0.25)}
.feed-level.low{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.2)}
.feed-title{font-size:11px;line-height:1.4;margin-top:4px;color:#c8d0da}
.feed-meta{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px;display:flex;justify-content:space-between}

/* Bottom panel area */
.bottom-area{grid-column:2/3;display:flex;flex-direction:column;background:var(--panel);border-top:1px solid var(--border)}
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab-btn{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:8px 14px;background:none;border:none;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{flex:1;position:relative;overflow:hidden}
.tab-pane{position:absolute;inset:0;display:none;overflow:auto;padding:10px}
.tab-pane::-webkit-scrollbar{width:3px;height:3px}
.tab-pane::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.12);border-radius:2px}
.tab-pane.active{display:block}
#cveCanvas{width:100%;height:100%;display:block}
#attackCanvas{width:100%;height:100%;display:block}

/* Actor cards */
.actor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.actor-card{padding:8px 10px;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);transition:border-color 0.15s}
.actor-card:hover{border-color:var(--border-bright)}
.actor-name{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--red);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.actor-victims{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)}
.actor-label{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase}

/* China intel */
.china-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;height:100%}
.china-section{display:flex;flex-direction:column}
.china-section h5{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.04)}
.china-item{font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.02);line-height:1.4;color:#b0b8c4}
.china-count{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);margin-bottom:2px}

/* LLM brief */
.llm-brief{padding:4px 0}
.idea-card{padding:10px;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);margin-bottom:6px}
.idea-title{font-size:12px;font-weight:600;margin-bottom:4px}
.idea-body{font-size:11px;line-height:1.5;color:#a0a8b4}
.idea-tag{display:inline-block;font-family:var(--mono);font-size:8px;padding:1px 5px;border:1px solid var(--border);color:var(--accent);margin-right:4px;letter-spacing:0.06em;text-transform:uppercase}

/* Scrollbar for all */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.1);border-radius:2px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="scanline"></div>

<!-- Boot screen -->
<div id="boot">
  <div class="boot-logo" id="bootLogo">CRUCIX CYBER</div>
  <div id="bootLines"></div>
  <div id="bootFinal">THREAT INTELLIGENCE ONLINE</div>
</div>

<!-- Main dashboard -->
<div id="main">
  <!-- Top bar -->
  <div class="topbar" id="topbar">
    <div class="brand">CRUCIX</div>
    <div class="threat-index" id="threatIndex">
      <div>
        <div class="ti-label">Threat Level</div>
        <div style="display:flex;align-items:baseline">
          <div class="ti-value" id="tiValue">--</div>
          <div class="ti-dir" id="tiDir"></div>
        </div>
      </div>
    </div>
    <div class="stat-pill"><div class="sp-val" id="kevCount">--</div><div class="sp-label">Active KEVs</div></div>
    <div class="stat-pill"><div class="sp-val" id="aptCount">--</div><div class="sp-label">APT Groups</div></div>
    <div class="stat-pill"><div class="sp-val" id="newKev">--</div><div class="sp-label">New KEVs Today</div></div>
    <div class="stat-pill"><div class="sp-val" id="critCve">--</div><div class="sp-label">Critical CVEs</div></div>
    <div class="stat-pill"><div class="sp-val" id="iocTotal">--</div><div class="sp-label">Total IOCs</div></div>
    <div class="stat-pill"><div class="sp-val" id="sourceStatus">--</div><div class="sp-label">Active Sources</div></div>
    <div class="top-spacer"></div>
    <select class="region-select" id="regionFilter">
      <option value="global">Global</option>
      <option value="CN">China</option>
      <option value="US">US</option>
      <option value="EU">EU</option>
      <option value="APAC">APAC</option>
    </select>
    <div class="meta-ts" id="metaTs">--</div>
  </div>

  <!-- Left sidebar -->
  <div class="sidebar-left" id="sidebarLeft">
    <h4>Globe Layers</h4>
    <div id="layerToggles"></div>
    <div class="health-section">
      <h4>Source Health</h4>
      <div class="health-grid" id="healthGrid"></div>
    </div>
  </div>

  <!-- Center: 3D Globe -->
  <div class="center-area" id="mapContainer">
    <div id="globeViz"></div>
    <div class="globe-stats" id="globeStats">DRAG TO ROTATE · SCROLL TO ZOOM</div>
    <div class="globe-legend" id="globeLegend"></div>
  </div>

  <!-- Right sidebar: intelligence feed -->
  <div class="sidebar-right">
    <div class="feed-header">
      <h3>Intelligence Feed</h3>
      <div class="feed-count" id="feedCount">0</div>
    </div>
    <div id="feedList"></div>
  </div>

  <!-- Bottom panels -->
  <div class="bottom-area">
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" data-tab="cve">CVE Timeline</button>
      <button class="tab-btn" data-tab="attack">ATT&CK Heatmap</button>
      <button class="tab-btn" data-tab="actors">Threat Actors</button>
      <button class="tab-btn" data-tab="china">China Intel</button>
      <button class="tab-btn" data-tab="llm">LLM Brief</button>
    </div>
    <div class="tab-content">
      <div class="tab-pane active" id="tab-cve"><canvas id="cveCanvas"></canvas></div>
      <div class="tab-pane" id="tab-attack"><canvas id="attackCanvas"></canvas></div>
      <div class="tab-pane" id="tab-actors"><div class="actor-grid" id="actorGrid"></div></div>
      <div class="tab-pane" id="tab-china"><div class="china-grid" id="chinaGrid"></div></div>
      <div class="tab-pane" id="tab-llm"><div class="llm-brief" id="llmBrief"></div></div>
    </div>
  </div>
</div>

<script>
// === DATA ===
let D = {};

// === LAYER DEFINITIONS ===
const LAYERS = [
  { id:'attack_source', name:'Attack Sources', color:'#ff1744', visible:true },
  { id:'victim',        name:'Victims',        color:'#ff6d00', visible:true },
  { id:'honeypot',      name:'Honeypots',      color:'#ffc107', visible:true },
  { id:'apt',           name:'APT Groups',     color:'#aa00ff', visible:true },
  { id:'c2',            name:'C2 Infrastructure', color:'#b71c1c', visible:true },
  { id:'exposed_asset', name:'Exposed Assets',  color:'#2979ff', visible:true },
  { id:'cert',          name:'CERT Alerts',     color:'#00e676', visible:true },
  { id:'bgp_anomaly',   name:'BGP Anomalies',  color:'#ffffff', visible:true },
];

const TYPE_COLORS = {
  attack_source:'#ff1744', victim:'#ff6d00', honeypot:'#ffc107',
  apt:'#aa00ff', c2:'#b71c1c', exposed_asset:'#2979ff',
  cert:'#00e676', bgp_anomaly:'#ffffff'
};

// === GLOBE STATE ===
let globe = null;
let globeInitialized = false;

// === HELPERS ===
function safe(v, fallback){ return v != null ? v : fallback; }
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function fmtTime(ts){
  if(!ts) return '--';
  try{ const d=new Date(ts); return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}); }catch{ return ts; }
}
function threatColor(idx){
  if(idx>=80) return '#ff1744';
  if(idx>=60) return '#ff6d00';
  if(idx>=40) return '#ffc107';
  if(idx>=20) return '#00e676';
  return '#00e5ff';
}

// === BOOT SEQUENCE ===
function runBoot(){
  const logo = document.getElementById('bootLogo');
  const lines = document.getElementById('bootLines');
  const final = document.getElementById('bootFinal');

  const bootSteps = [
    ['Initializing threat intelligence core', 'ok'],
    ['Connecting CISA KEV feed', 'ok'],
    ['Loading MITRE ATT&CK framework', 'ok'],
    ['Scanning CNVD/CNNVD/CNCERT sources', 'ok'],
    ['Bootstrapping IOC correlation engine', 'ok'],
    ['Globe renderer ready', 'ok'],
  ];

  logo.style.opacity = '1';
  logo.style.transition = 'opacity 0.6s';

  setTimeout(() => {
    lines.style.opacity = '1';
    lines.style.transition = 'opacity 0.3s';
    let i = 0;
    const iv = setInterval(() => {
      if(i >= bootSteps.length){ clearInterval(iv); finishBoot(); return; }
      const [text, status] = bootSteps[i];
      const cls = status === 'ok' ? 'ok' : status === 'warn' ? 'warn' : 'fail';
      const tag = status === 'ok' ? '  OK' : status === 'warn' ? 'WARN' : 'FAIL';
      lines.innerHTML += `<span class="${cls}">[${tag}]</span> ${esc(text)}\n`;
      i++;
    }, 250);
  }, 400);

  function finishBoot(){
    const h = (D.health||[]);
    const ok = h.filter(s=>!s.err&&!s.stale).length;
    lines.innerHTML += `<span class="ok">[${ok}/${h.length||'?'}]</span> sources online\n`;
    final.style.opacity = '1';
    final.style.transition = 'opacity 0.4s';
    setTimeout(() => {
      document.getElementById('boot').style.transition = 'opacity 0.5s';
      document.getElementById('boot').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('boot').style.display = 'none';
        document.getElementById('main').style.opacity = '1';
        document.getElementById('main').style.transition = 'opacity 0.5s';
        initGlobe();
      }, 500);
    }, 800);
  }
}

// === TOP BAR ===
function updateTopbar(){
  const threats = D.threats || {};
  const meta = D.meta || {};
  const cves = D.cves || {};
  const actors = D.actors || {};
  const iocs = D.iocs || {};

  const idx = safe(threats.index, 0);
  const tiVal = document.getElementById('tiValue');
  tiVal.textContent = idx;
  tiVal.style.color = threatColor(idx);

  const dir = safe(threats.direction, '');
  const tiDir = document.getElementById('tiDir');
  tiDir.textContent = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '—';
  tiDir.style.color = dir === 'up' ? '#ff1744' : dir === 'down' ? '#00e676' : '#5a6a7a';

  document.getElementById('kevCount').textContent = safe(cves.kevCount, 0);
  document.getElementById('aptCount').textContent = safe((actors.ransomwareGroups||[]).length, 0);

  const recentKev = (cves.recent||[]).filter(c => {
    if(!c.inKEV || !c.publishedDate) return false;
    const d = new Date(c.publishedDate);
    const now = new Date();
    return (now - d) < 86400000;
  });
  document.getElementById('newKev').textContent = recentKev.length;
  document.getElementById('critCve').textContent = safe(cves.criticalCount, 0);
  document.getElementById('iocTotal').textContent = safe(iocs.total, 0);

  const srcOk = safe(meta.sourcesOk, 0);
  const srcTotal = safe(meta.sourcesQueried, 0);
  document.getElementById('sourceStatus').textContent = `${srcOk}/${srcTotal}`;

  document.getElementById('metaTs').textContent = fmtTime(meta.timestamp);
}

// === LEFT SIDEBAR ===
function renderLayers(){
  const container = document.getElementById('layerToggles');
  const geoData = D.geoAttacks || [];
  container.innerHTML = '';

  LAYERS.forEach(layer => {
    const count = geoData.filter(p => p.type === layer.id).length;
    const el = document.createElement('div');
    el.className = 'layer-item' + (layer.visible ? '' : ' off');
    el.innerHTML = `
      <div class="layer-dot" style="background:${layer.color};box-shadow:0 0 6px ${layer.color}60"></div>
      <div class="layer-info"><div class="layer-name">${esc(layer.name)}</div></div>
      <div class="layer-count">${count}</div>
      <div class="layer-toggle${layer.visible ? ' on' : ''}"></div>
    `;
    el.addEventListener('click', () => {
      layer.visible = !layer.visible;
      renderLayers();
      plotGlobeMarkers();
    });

// === 3D GLOBE ===
function initGlobe(){
  if(globeInitialized && globe) return;
  const container = document.getElementById('mapContainer');
  const w = container.clientWidth;
  const h = container.clientHeight || 500;

  globe = Globe()
    .width(w)
    .height(h)
    .globeImageUrl('//unpkg.com/three-globe@2.33.0/example/img/earth-night.jpg')
    .bumpImageUrl('//unpkg.com/three-globe@2.33.0/example/img/earth-topology.png')
    .backgroundImageUrl('')
    .backgroundColor('rgba(0,0,0,0)')
    .atmosphereColor('#00e5ff')
    .atmosphereAltitude(0.18)
    .showGraticules(true)
    .pointAltitude(d => d.alt || 0.01)
    .pointRadius(d => d.size || 0.3)
    .pointColor(d => d.color)
    .pointLabel(d => `<b style="color:${d.color}">${esc(d.label||'')}</b><br><span style="opacity:0.7;font-size:10px">${esc(d.source||'')} · ${esc(d.severity||'')}</span>`)
    .onPointHover(pt => { document.getElementById('globeViz').style.cursor = pt ? 'pointer' : 'grab'; })
    .arcColor(d => d.color)
    .arcStroke(d => d.stroke || 0.4)
    .arcDashLength(0.4)
    .arcDashGap(0.2)
    .arcDashAnimateTime(2000)
    .arcAltitudeAutoScale(0.3)
    .arcLabel(d => d.label || '')
    .ringColor(d => t => {
      const c = d.ringColor || '255,23,68';
      return `rgba(${c},${1-t})`;
    })
    .ringMaxRadius(d => d.maxR || 3)
    .ringPropagationSpeed(d => d.speed || 2)
    .ringRepeatPeriod(d => d.period || 1200)
    (document.getElementById('globeViz'));

  const scene = globe.scene();
  const renderer = globe.renderer();
  renderer.setClearColor(0x000000, 0);

  // Stars
  const starGeom = new THREE.BufferGeometry();
  const sv = [];
  for(let i=0;i<1500;i++){
    const r=700+Math.random()*300;
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    sv.push(r*Math.sin(phi)*Math.cos(theta),r*Math.sin(phi)*Math.sin(theta),r*Math.cos(phi));
  }
  starGeom.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(starGeom,new THREE.PointsMaterial({color:0x4488aa,size:0.7,transparent:true,opacity:0.5})));

  // Graticule color
  scene.traverse(obj => {
    if(obj.material && obj.type === 'Line'){
      obj.material.color.set(0x0a1a2a);
      obj.material.opacity = 0.2;
      obj.material.transparent = true;
    }
  });

  globe.pointOfView({lat:25,lng:30,altitude:2.2},0);
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.25;
  globe.controls().enableDamping = true;
  globe.controls().dampingFactor = 0.1;

  let rotateTimeout;
  const el = document.getElementById('globeViz');
  el.addEventListener('mousedown', () => {
    globe.controls().autoRotate = false;
    clearTimeout(rotateTimeout);
  });
  el.addEventListener('mouseup', () => {
    rotateTimeout = setTimeout(() => { if(globe) globe.controls().autoRotate = true; }, 12000);
  });

  globeInitialized = true;
  plotGlobeMarkers();
  renderGlobeLegend();

  window.addEventListener('resize', () => {
    if(!globe) return;
    globe.width(container.clientWidth);
    globe.height(container.clientHeight);
  });
}

function plotGlobeMarkers(){
  if(!globe) return;
  const geo = D.geoAttacks || [];
  const visibleTypes = new Set(LAYERS.filter(l=>l.visible).map(l=>l.id));

  const points = [];
  const rings = [];
  const arcs = [];

  const sources = [];
  const victims = [];

  geo.forEach(pt => {
    if(!visibleTypes.has(pt.type)) return;
    const color = TYPE_COLORS[pt.type] || '#ffffff';
    const sev = (pt.severity||'').toLowerCase();
    const sizeMul = sev === 'critical' ? 1.6 : sev === 'high' ? 1.2 : sev === 'medium' ? 0.9 : 0.6;
    points.push({
      lat: pt.lat, lng: pt.lon, size: 0.25 * sizeMul, alt: 0.01,
      color, label: pt.label, source: pt.source, severity: pt.severity, type: pt.type
    });

    if(sev === 'critical'){
      const rgb = color === '#ff1744' ? '255,23,68' :
                  color === '#ff6d00' ? '255,109,0' :
                  color === '#aa00ff' ? '170,0,255' : '255,255,255';
      rings.push({ lat:pt.lat, lng:pt.lon, maxR:4, speed:2, period:1000, ringColor:rgb });
    }

    if(pt.type === 'attack_source') sources.push(pt);
    if(pt.type === 'victim') victims.push(pt);
  });

  // Attack arcs from sources to victims
  if(visibleTypes.has('attack_source') && visibleTypes.has('victim')){
    sources.forEach(src => {
      victims.slice(0,5).forEach(vic => {
        arcs.push({
          startLat:src.lat, startLng:src.lon,
          endLat:vic.lat, endLng:vic.lon,
          color:['rgba(255,23,68,0.6)','rgba(255,109,0,0.6)'],
          stroke:0.3, label:`${src.label||'?'} → ${vic.label||'?'}`
        });
      });
    });
  }

  globe.pointsData(points);
  globe.ringsData(rings);
  globe.arcsData(arcs);
}

function renderFeed(){
  const list = document.getElementById('feedList');
  const items = (D.newsFeed || []).slice();

  items.sort((a,b) => {
    const order = {CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};
    const la = order[(a.level||'LOW').toUpperCase()] ?? 3;

// Tab 1: CVE Timeline scatter plot
function drawCveTimeline(){
  const canvas = document.getElementById('cveCanvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = rect.width, H = rect.height;

  ctx.fillStyle = 'rgba(10,10,15,0.95)';
  ctx.fillRect(0,0,W,H);

  const cves = (D.cves && D.cves.recent) || [];
  if(!cves.length){
    ctx.fillStyle = '#5a6a7a';
    ctx.font = '12px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText('No CVE data available', W/2, H/2);
    return;
  }

  const pad = {top:25, right:20, bottom:30, left:50};
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  const dates = cves.map(c => new Date(c.publishedDate || Date.now()).getTime());
  const minDate = Math.min(...dates);
  const maxDate = Math.max(...dates);
  const dateRange = maxDate - minDate || 86400000;

  // Axes
  ctx.strokeStyle = 'rgba(0,229,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, pad.top + ph);
  ctx.lineTo(pad.left + pw, pad.top + ph);
  ctx.stroke();

  // Y-axis labels (CVSS 0-10)
  ctx.fillStyle = '#5a6a7a';
  ctx.font = '9px "JetBrains Mono"';
  ctx.textAlign = 'right';
  for(let i = 0; i <= 10; i += 2){
    const y = pad.top + ph - (i / 10) * ph;
    ctx.fillText(i.toString(), pad.left - 6, y + 3);
    if(i > 0){
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + pw, y); ctx.stroke();
    }
  }

  // Y label
  ctx.save();
  ctx.translate(12, pad.top + ph/2);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#5a6a7a';
  ctx.font = '9px "JetBrains Mono"';
  ctx.fillText('CVSS', 0, 0);
  ctx.restore();

  // X label
  ctx.textAlign = 'center';
  ctx.fillText('Published Date', pad.left + pw/2, H - 4);

  // Dots
  cves.forEach(c => {
    const cvss = parseFloat(c.cvss) || 0;
    const epss = parseFloat(c.epss) || 0;
    const t = new Date(c.publishedDate || Date.now()).getTime();

    const x = pad.left + ((t - minDate) / dateRange) * pw;
    const y = pad.top + ph - (cvss / 10) * ph;
    const r = Math.max(3, Math.min(12, epss * 40));

    let color;
    if(c.inKEV) color = '#ff1744';
    else if(c.hasPoc) color = '#ff6d00';
    else color = '#5a6a7a';

    ctx.globalAlpha = 0.7;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    if(c.inKEV){
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#ff1744';
      ctx.beginPath();
      ctx.arc(x, y, r + 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  // Legend
  const legX = pad.left + 10;
  const legY = pad.top + 8;
  ctx.font = '9px "JetBrains Mono"';
  [['#ff1744','In KEV'],['#ff6d00','Has PoC'],['#5a6a7a','Other']].forEach(([col,lbl],i) => {
    const ox = legX + i * 80;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(ox, legY, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a9aaa';
    ctx.textAlign = 'left';
    ctx.fillText(lbl, ox + 8, legY + 3);
  });
}

// Tab 2: ATT&CK Heatmap
function drawAttackHeatmap(){
  const canvas = document.getElementById('attackCanvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = rect.width, H = rect.height;

  ctx.fillStyle = 'rgba(10,10,15,0.95)';
  ctx.fillRect(0,0,W,H);

  const matrix = D.attackMatrix || {};
  const tactics = matrix.tactics || [];
  const techniques = matrix.techniques || [];

  if(!tactics.length){
    ctx.fillStyle = '#5a6a7a';
    ctx.font = '12px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText('No ATT&CK data available', W/2, H/2);
    return;
  }

  const pad = {top:10, right:10, bottom:50, left:10};
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;
  const cols = tactics.length;
  const cellW = Math.min(pw / cols, 100);
  const startX = pad.left + (pw - cellW * cols) / 2;

  // group techniques by tactic
  const tacticMap = {};
  tactics.forEach(t => { tacticMap[t.id] = { name:t.name, count:t.techniqueCount||0 }; });

  const maxCount = Math.max(1, ...tactics.map(t => t.techniqueCount || 0));
  const rows = 8;
  const cellH = Math.min(ph / rows, 28);
  const startY = pad.top + (ph - cellH * rows) / 2;

  tactics.forEach((tac, ci) => {
    const intensity = (tac.techniqueCount || 0) / maxCount;
    for(let ri = 0; ri < rows; ri++){
      const rowInt = intensity * (1 - ri * 0.1);
      const alpha = Math.max(0.03, Math.min(1, rowInt));
      const x = startX + ci * cellW;
      const y = startY + ri * cellH;

      if(rowInt > 0.6) ctx.fillStyle = `rgba(255,23,68,${alpha})`;
      else if(rowInt > 0.3) ctx.fillStyle = `rgba(255,109,0,${alpha * 0.8})`;
      else ctx.fillStyle = `rgba(0,229,255,${alpha * 0.4})`;

      ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
    }

    // Tactic label
    ctx.save();
    ctx.translate(startX + ci * cellW + cellW/2, startY + rows * cellH + 8);
    ctx.rotate(-Math.PI/4);
    ctx.fillStyle = '#8a9aaa';
    ctx.font = '8px "JetBrains Mono"';
    ctx.textAlign = 'right';
    const name = (tac.name||'').length > 16 ? (tac.name||'').slice(0,14)+'..' : (tac.name||'');
    ctx.fillText(name, 0, 0);
    ctx.restore();

    // Count label on top
    ctx.fillStyle = '#00e5ff';
    ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(String(tac.techniqueCount||0), startX + ci * cellW + cellW/2, startY - 3);
  });
}

// === SSE ===
function connectSSE(){
  if(typeof EventSource === 'undefined') return;
  if(location.protocol === 'file:') return;

  const es = new EventSource('/events');
  es.onmessage = (e) => {
    try{
      const msg = JSON.parse(e.data);
      if(msg.type === 'update' && msg.data){
        D = msg.data;
        updateAll();
        const topbar = document.querySelector('.topbar');
        if(topbar){
          topbar.style.borderColor = 'var(--accent)';
          setTimeout(() => topbar.style.borderColor = '', 1500);
        }
      } else if(msg.type === 'sweep_start'){
        const ts = document.getElementById('metaTs');
        if(ts) ts.textContent = 'SWEEPING...';
      }
    }catch{}
  };
  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 5000);
  };
}

function init(){

  if(!booted){ runBoot(); booted = true; }
  // Redraw canvas panels on resize
  window.addEventListener('resize', () => {
    const activeTab = document.querySelector('.tab-btn.active');
    if(activeTab){
      if(activeTab.dataset.tab === 'cve') requestAnimationFrame(drawCveTimeline);
      if(activeTab.dataset.tab === 'attack') requestAnimationFrame(drawAttackHeatmap);
    }
  });

document.addEventListener('DOMContentLoaded', () => {
  const hasInlineData = !!(D && D.meta);
  const canProbeApi = location.protocol !== 'file:';

  if(canProbeApi && !hasInlineData){
    fetch('/api/data')
      .then(r => r.json())
      .then(data => { D = data; init(); connectSSE(); })
      .catch(() => {
        if(D && D.meta){ init(); connectSSE(); }
      });
  } else if(hasInlineData){
    init();
  } else {
    // No data at all — show dashboard skeleton
    init();
  }
});
