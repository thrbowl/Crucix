<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIX — Cybersecurity Intelligence Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.33.0"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--panel:rgba(12,12,20,0.92);--glass:rgba(14,14,24,0.75);
  --border:rgba(0,229,255,0.12);--border-bright:rgba(0,229,255,0.35);
  --text:#e0e6ed;--dim:#5a6a7a;--accent:#00e5ff;--red:#ff1744;
  --orange:#ff6d00;--yellow:#ffc107;--green:#00e676;--purple:#aa00ff;
  --darkred:#b71c1c;--blue:#2979ff;
  --mono:'JetBrains Mono','Fira Code',monospace;--sans:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;overflow-y:auto}

/* Background effects */
.bg-grid{position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);
  background-size:40px 40px;opacity:0.5}
.scanline{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9999;opacity:0.3}
.scanline::after{content:'';position:absolute;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.08),transparent);animation:scanMove 6s linear infinite}
@keyframes scanMove{0%{top:-2px}100%{top:100%}}

/* Boot screen */
#boot{position:fixed;inset:0;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.boot-logo{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:0.3em;color:var(--accent);opacity:0;text-shadow:0 0 30px rgba(0,229,255,0.4)}
#bootLines{margin-top:24px;font-family:var(--mono);font-size:11px;color:var(--dim);text-align:left;line-height:2;min-width:380px;opacity:0}
#bootLines .ok{color:var(--green)}
#bootLines .warn{color:var(--yellow)}
#bootLines .fail{color:var(--red)}
#bootFinal{margin-top:20px;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:0.15em;opacity:0}

/* Main layout */
#main{opacity:0;display:grid;grid-template-rows:52px 28px 1fr 30px;grid-template-columns:240px 1fr 320px;height:100vh;height:100dvh;gap:1px;background:rgba(0,229,255,0.04)}

/* Top bar */
.topbar{grid-column:1/-1;display:flex;align-items:center;padding:0 16px;gap:12px;background:var(--panel);border-bottom:1px solid var(--border);overflow:hidden}
.stats-row{grid-column:1/-1;grid-row:2;display:flex;align-items:center;gap:6px;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:nowrap}
.stats-row::-webkit-scrollbar{height:2px}
.stats-row::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15)}
.stat-chip{display:flex;align-items:baseline;gap:5px;padding:2px 8px;border-radius:3px;border:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.sc-val{font-family:var(--mono);font-size:13px;font-weight:700}
.sc-label{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim)}
.threat-index{display:flex;align-items:center;gap:8px;padding:0 14px;height:100%;border-right:1px solid var(--border)}
.threat-index .ti-label{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim)}
.threat-index .ti-value{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1}
.threat-index .ti-dir{font-family:var(--mono);font-size:11px;margin-left:4px}
.stat-pill{display:flex;flex-direction:column;align-items:center;padding:0 12px;height:100%;justify-content:center;border-right:1px solid rgba(255,255,255,0.04)}
.stat-pill .sp-val{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text)}
.stat-pill .sp-label{font-family:var(--mono);font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);white-space:nowrap}
.top-spacer{flex:1}
.region-select{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;padding:6px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);cursor:pointer;text-transform:uppercase}
.region-select:focus{outline:none;border-color:var(--accent)}
.region-select option{background:#0a0a0f;color:var(--text)}
.meta-ts{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:0.06em;white-space:nowrap}
.brand{font-family:var(--mono);font-weight:700;font-size:14px;letter-spacing:0.14em;color:var(--accent);text-transform:uppercase;padding-right:14px;border-right:1px solid var(--border);white-space:nowrap}
.lang-btn{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;padding:4px 10px;background:rgba(0,229,255,0.06);border:1px solid var(--border);color:var(--accent);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.lang-btn:hover{background:rgba(0,229,255,0.15);border-color:var(--accent)}

/* Left sidebar — Sensor Grid */
.sidebar-left{grid-column:1;grid-row:3/4;display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:6px}
.sidebar-left::-webkit-scrollbar{width:3px}
.sidebar-left::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15);border-radius:2px}
.sidebar-left h4{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);padding:6px 4px 5px;border-bottom:1px solid rgba(255,255,255,0.04)}
.sensor-card{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s}
.sensor-card:hover{background:rgba(0,229,255,0.04)}
.sensor-header{display:flex;align-items:center;justify-content:space-between;gap:4px}
.sensor-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sensor-name{font-family:var(--mono);font-size:9px;letter-spacing:0.06em;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sensor-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent);line-height:1.2;padding:2px 0 0 0}
.sensor-sub{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:0.04em}
.layer-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s}
.layer-item:hover{background:rgba(0,229,255,0.04)}
.layer-item.off{opacity:0.35}
.layer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.layer-info{flex:1;min-width:0}
.layer-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.layer-count{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0}
.layer-toggle{width:28px;height:14px;border-radius:7px;background:rgba(255,255,255,0.08);position:relative;flex-shrink:0;transition:background 0.2s}
.layer-toggle.on{background:rgba(0,229,255,0.25)}
.layer-toggle::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--dim);transition:all 0.2s}
.layer-toggle.on::after{left:16px;background:var(--accent)}

/* Source health (compact) */
.health-section{margin-top:auto;padding-top:6px;border-top:1px solid var(--border)}
.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;padding:2px 0}
.health-item{font-family:var(--mono);font-size:8px;padding:2px 3px;display:flex;align-items:center;gap:3px;letter-spacing:0.04em}
.health-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.health-dot.ok{background:var(--green)}
.health-dot.err{background:var(--red)}
.health-dot.stale{background:var(--yellow)}

/* Center: map area */
.center-area{grid-column:2;grid-row:3/4;display:flex;flex-direction:column;overflow-y:auto;background:#080812}
.region-tabs{display:flex;gap:0;flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);padding:0 8px}
.region-btn{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;padding:7px 14px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);cursor:pointer;text-transform:uppercase;transition:all 0.15s;white-space:nowrap}
.region-btn:hover{color:var(--text);background:rgba(0,229,255,0.03)}
.region-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.map-wrapper{position:relative;flex:0 0 35vh;min-height:200px;overflow:hidden}
.map-fullscreen{position:fixed!important;inset:0;z-index:9999;flex:none!important;height:100vh!important}
.map-fs-btn{position:absolute;top:6px;right:6px;z-index:25;background:rgba(8,8,18,0.85);border:1px solid var(--border);color:var(--dim);font-size:14px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:3px;line-height:1}
.map-fs-btn:hover{color:var(--accent)}
.map-layers-bar{display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.mlb-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);flex-shrink:0}
.center-scroll{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border)}
.center-scroll::-webkit-scrollbar{width:3px}
.center-scroll::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.12);border-radius:2px}
#globeViz{width:100%;height:100%;cursor:grab;display:none}
#globeViz:active{cursor:grabbing}
#globeViz canvas{outline:none}
#flatMap{position:absolute;inset:0;cursor:crosshair}
.globe-legend{position:absolute;bottom:8px;left:10px;display:flex;gap:10px;font-family:var(--mono);font-size:9px;color:var(--dim);z-index:5;flex-wrap:wrap;letter-spacing:0.04em}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:7px;height:7px;border-radius:50%}
.globe-stats{position:absolute;top:8px;left:10px;font-family:var(--mono);font-size:9px;color:var(--dim);z-index:5;letter-spacing:0.06em}
.mode-toggle{position:absolute;top:8px;right:10px;z-index:10;display:flex;gap:4px}
.mode-btn{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;padding:4px 10px;background:rgba(12,12,20,0.85);border:1px solid var(--border);color:var(--dim);cursor:pointer;text-transform:uppercase;backdrop-filter:blur(4px);transition:all 0.15s}
.mode-btn:hover{color:var(--text)}
.mode-btn.active{color:var(--accent);border-color:var(--accent)}
.map-zoom{position:absolute;top:8px;left:10px;z-index:10;display:flex;flex-direction:column;gap:2px}
.zoom-btn{width:24px;height:24px;font-family:var(--mono);font-size:14px;font-weight:700;background:rgba(12,12,20,0.85);border:1px solid var(--border);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;backdrop-filter:blur(4px)}
.zoom-btn:hover{color:var(--accent);border-color:var(--accent)}

/* Right sidebar: intel feed */
.sidebar-right{grid-column:3;grid-row:3/4;display:flex;flex-direction:column;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto}
.sidebar-right::-webkit-scrollbar{width:3px}
.sidebar-right::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.12);border-radius:2px}
.feed-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.feed-header h3{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim)}
.feed-count{font-family:var(--mono);font-size:10px;color:var(--accent);padding:2px 8px;border:1px solid var(--border)}
#feedList{flex:1;overflow-y:auto;padding:4px}
#feedList::-webkit-scrollbar{width:3px}
#feedList::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.12);border-radius:2px}
.feed-item{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:default;transition:background 0.15s}
.feed-item:hover{background:rgba(0,229,255,0.03)}
.feed-item.critical{border-left:2px solid var(--red);animation:critPulse 2s ease-in-out infinite}
.feed-item.high{border-left:2px solid var(--orange)}
.feed-item.medium{border-left:2px solid var(--yellow)}
.feed-item.low{border-left:2px solid var(--green)}
@keyframes critPulse{0%,100%{box-shadow:inset 0 0 0 transparent}50%{box-shadow:inset 0 0 12px rgba(255,23,68,0.08)}}
.feed-level{display:inline-block;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.1em;padding:1px 5px;margin-right:6px;text-transform:uppercase}
.feed-level.critical{background:rgba(255,23,68,0.2);color:var(--red);border:1px solid rgba(255,23,68,0.3)}
.feed-level.high{background:rgba(255,109,0,0.15);color:var(--orange);border:1px solid rgba(255,109,0,0.3)}
.feed-level.medium{background:rgba(255,193,7,0.12);color:var(--yellow);border:1px solid rgba(255,193,7,0.25)}
.feed-level.low{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.2)}
.feed-title{font-size:11px;line-height:1.4;margin-top:4px;color:#c8d0da}
.feed-meta{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px;display:flex;justify-content:space-between}

/* Floating bottom panel — overlays center area */
.bottom-area{display:flex;flex-direction:column;flex-shrink:0;border-top:1px solid var(--border)}
.tab-bar{display:flex;gap:0;flex-shrink:0}
.tab-btn{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:6px 12px;background:rgba(12,12,20,0.95);border:1px solid var(--border-bright);border-bottom:none;border-radius:4px 4px 0 0;color:var(--dim);cursor:pointer;transition:all 0.15s;white-space:nowrap;margin-right:-1px;backdrop-filter:blur(6px)}
.tab-btn:hover{color:var(--text);background:rgba(14,14,24,1)}
.tab-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(12,12,20,0.98);box-shadow:0 -2px 12px rgba(0,229,255,0.15)}
.tab-content{max-height:0;overflow:hidden;transition:max-height 0.35s ease;background:var(--panel);border-top:1px solid var(--border-bright);box-shadow:0 -4px 24px rgba(0,0,0,0.5)}
.bottom-area .tab-content{max-height:260px}
.tab-pane{display:none;overflow:auto;padding:10px;height:240px}
.tab-pane::-webkit-scrollbar{width:3px;height:3px}
.tab-pane::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.12);border-radius:2px}
.tab-pane.active{display:block}
#cveCanvas{width:100%;height:100%;display:block}
#attackCanvas{width:100%;height:100%;display:block}

/* Bottom ticker */
.ticker-bar{grid-column:1/-1;grid-row:3;display:flex;align-items:center;background:var(--panel);border-top:1px solid var(--border);overflow:hidden;padding:0 10px}
.ticker-label{font-family:var(--mono);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);padding-right:10px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.ticker-track{flex:1;overflow:hidden;position:relative;height:100%;display:flex;align-items:center}
.ticker-content{display:flex;gap:32px;white-space:nowrap;animation:tickerScroll 60s linear infinite;padding-left:100%}
.ticker-content:hover{animation-play-state:paused}
.ticker-item{font-family:var(--mono);font-size:10px;color:var(--dim);flex-shrink:0;cursor:default}
.ticker-item .t-sev{font-weight:700;margin-right:4px}
.ticker-item .t-sev.crit{color:var(--red)}
.ticker-item .t-sev.high{color:var(--orange)}
.ticker-item .t-sev.med{color:var(--yellow)}
.ticker-item .t-sev.low{color:var(--green)}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* Actor cards */
.actor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.actor-card{padding:8px 10px;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);transition:border-color 0.15s}
.actor-card:hover{border-color:var(--border-bright)}
.actor-name{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--red);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.actor-victims{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)}
.actor-label{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase}

/* China intel */
.china-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;height:100%}
.china-section{display:flex;flex-direction:column}
.china-section h5{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.04)}
.china-item{font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.02);line-height:1.4;color:#b0b8c4}
.china-count{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);margin-bottom:2px}

/* LLM brief */
.llm-brief{padding:4px 0}
.idea-card{padding:10px;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);margin-bottom:6px}
.idea-title{font-size:12px;font-weight:600;margin-bottom:4px}
.idea-body{font-size:11px;line-height:1.5;color:#a0a8b4}
.idea-tag{display:inline-block;font-family:var(--mono);font-size:8px;padding:1px 5px;border:1px solid var(--border);color:var(--accent);margin-right:4px;letter-spacing:0.06em;text-transform:uppercase}

/* Badges & live indicators */
.live-badge{font-family:var(--mono);font-size:8px;letter-spacing:0.1em;padding:2px 6px;background:rgba(0,230,118,0.15);color:var(--green);border:1px solid rgba(0,230,118,0.3);animation:livePulse 2s ease-in-out infinite}
.alert-badge{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;padding:3px 10px;font-weight:700;border:1px solid;white-space:nowrap}
.alert-badge.critical{background:rgba(255,23,68,0.25);color:var(--red);border-color:rgba(255,23,68,0.5);animation:alertPulse 1.5s ease-in-out infinite}
.alert-badge.high{background:rgba(255,109,0,0.18);color:var(--orange);border-color:rgba(255,109,0,0.45)}
.alert-badge.elevated{background:rgba(255,193,7,0.12);color:var(--yellow);border-color:rgba(255,193,7,0.35)}
.alert-badge.low{background:rgba(0,230,118,0.1);color:var(--green);border-color:rgba(0,230,118,0.25)}
.status-badge{font-family:var(--mono);font-size:8px;letter-spacing:0.06em;padding:2px 8px;border:1px solid var(--border);white-space:nowrap;color:var(--dim)}
.ai-badge{font-family:var(--mono);font-size:8px;letter-spacing:0.06em;padding:2px 6px;background:rgba(170,0,255,0.12);color:var(--purple);border:1px solid rgba(170,0,255,0.3)}
.sweep-pill{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:0.06em;white-space:nowrap;padding:0 8px;display:flex;align-items:center;gap:4px;height:100%;border-right:1px solid rgba(255,255,255,0.04)}
.sweep-pill .sp-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.sweep-pill.active .sp-dot{background:var(--accent);animation:livePulse 1s ease-in-out infinite}
.delta-pill{font-family:var(--mono);font-size:9px;padding:0 10px;display:flex;align-items:center;gap:6px;height:100%;border-right:1px solid rgba(255,255,255,0.04)}
.delta-pill .dp-label{color:var(--dim);letter-spacing:0.06em}
.delta-pill .dp-val{font-weight:600}
.delta-pill .dp-val.mixed{color:var(--yellow)}
.delta-pill .dp-val.worsening{color:var(--red)}
.delta-pill .dp-val.improving{color:var(--green)}
.delta-pill .dp-val.stable{color:var(--dim)}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes alertPulse{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 12px rgba(255,23,68,0.3)}}

/* Sidebar section headers */
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 6px 5px;border-bottom:1px solid rgba(255,255,255,0.06);margin-top:4px}
.section-hdr:first-child{margin-top:0}
.section-hdr h4{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim)}
.section-hdr .sh-badge{font-family:var(--mono);font-size:8px;padding:1px 5px;border:1px solid var(--border);color:var(--accent)}

/* IOC Monitor rows */
.ioc-row{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s}
.ioc-row:hover{background:rgba(0,229,255,0.04)}
.ioc-left{display:flex;align-items:center;gap:5px}
.ioc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ioc-name{font-family:var(--mono);font-size:9px;color:var(--dim)}
.ioc-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent)}

/* CERT Alert rows */
.cert-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s}
.cert-row:hover{background:rgba(0,229,255,0.04)}
.clickable{cursor:pointer}
.clickable:hover{opacity:0.85}
.cert-org{font-family:var(--mono);font-size:9px;color:var(--dim);display:flex;align-items:center;gap:5px}
.cert-org .co-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cert-count{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent)}

/* Cross-Source Signal cards */
.signal-card{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background 0.15s}
.signal-card:hover{background:rgba(0,229,255,0.03)}
.signal-hdr{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.signal-num{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--accent)}
.signal-lvl{font-family:var(--mono);font-size:7px;letter-spacing:0.08em;padding:1px 4px;text-transform:uppercase}
.signal-lvl.critical{background:rgba(255,23,68,0.2);color:var(--red);border:1px solid rgba(255,23,68,0.3)}
.signal-lvl.high{background:rgba(255,109,0,0.15);color:var(--orange);border:1px solid rgba(255,109,0,0.3)}
.signal-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.3}
.signal-body{font-size:10px;color:#8a9aaa;line-height:1.4;margin-top:3px}

/* Hot Metrics */
.hot-metric{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.03)}
.hm-label{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:0.04em;text-transform:uppercase}
.hm-val{font-family:var(--mono);font-size:14px;font-weight:700;padding:2px 10px;border:1px solid var(--border);color:var(--accent);min-width:54px;text-align:center}
.hm-val.red{color:var(--red);border-color:rgba(255,23,68,0.3)}
.hm-val.orange{color:var(--orange);border-color:rgba(255,109,0,0.3)}

/* Sweep Delta */
.sweep-item{padding:5px 10px;font-family:var(--mono);font-size:10px;color:var(--dim);border-bottom:1px solid rgba(255,255,255,0.03);line-height:1.5}
.sw-new{color:var(--green)}
.sw-gone{color:var(--red)}
.sw-esc{color:var(--orange)}
.sw-label{color:var(--text);font-weight:500}

/* Panel cards (center below map) */
.panel-card{background:var(--panel);border:1px solid var(--border);border-radius:2px}
.panel-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border)}
.panel-hdr h4{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);flex:1}
.panel-count{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:0.06em}

/* News grid */
.news-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;max-height:200px;overflow-y:auto}
.news-grid::-webkit-scrollbar{width:3px}
.news-grid::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.12);border-radius:2px}
.news-card{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s}
.news-card:hover{background:rgba(0,229,255,0.04)}
.news-src{display:inline-block;font-family:var(--mono);font-size:7px;letter-spacing:0.06em;padding:1px 5px;margin-right:4px;margin-bottom:3px;text-transform:uppercase}
.news-time{font-family:var(--mono);font-size:8px;color:var(--dim)}
.news-text{font-size:11px;line-height:1.35;color:#b0b8c4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* CVE Trend stats */
.trend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:1px;padding:4px}
.trend-stat{padding:8px 10px;text-align:center}
.ts-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);line-height:1}
.ts-label{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.ts-val.red{color:var(--red)}
.ts-val.orange{color:var(--orange)}
.ts-val.green{color:var(--green)}

/* Map popup */
.map-popup{position:absolute;z-index:100;background:var(--panel);border:1px solid var(--border-bright);border-radius:4px;min-width:260px;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.6);backdrop-filter:blur(8px);pointer-events:auto}
.popup-close{position:absolute;top:6px;right:8px;font-size:16px;color:var(--dim);cursor:pointer;z-index:1;line-height:1}
.popup-close:hover{color:var(--text)}
.popup-body{padding:12px}
.popup-type{font-family:var(--mono);font-size:8px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;display:inline-block;margin-bottom:6px}
.popup-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.popup-detail{font-family:var(--mono);font-size:10px;color:var(--dim);line-height:1.6}
.popup-link{display:inline-block;font-family:var(--mono);font-size:9px;color:var(--accent);margin-top:8px;padding:3px 8px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;text-decoration:none}
.popup-link:hover{background:rgba(0,229,255,0.1);border-color:var(--accent)}
.popup-detail-btn{display:inline-block;margin-top:6px;font-size:10px;color:var(--accent);text-decoration:none;border:1px solid var(--border);padding:2px 6px;border-radius:2px;font-family:var(--mono)}
.popup-detail-btn:hover{background:rgba(0,229,255,0.08)}

/* Enhanced feed items */
.feed-src-badge{display:inline-block;font-family:var(--mono);font-size:7px;letter-spacing:0.08em;padding:1px 5px;margin-right:3px;text-transform:uppercase;border-radius:1px}
.feed-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}

/* Scrollbar for all */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.1);border-radius:2px}
</style>

<script>
// === I18N ===
let L = window.__CRUCIX_LOCALE__ || {};
let currentLang = window.__CRUCIX_LANG__ || 'zh';

function t(keyPath, fallbackOrParams, params) {
  let fallback = keyPath;
  if (typeof fallbackOrParams === 'string') { fallback = fallbackOrParams; }
  else if (typeof fallbackOrParams === 'object' && fallbackOrParams) { params = fallbackOrParams; }
  const keys = keyPath.split('.');
  let val = L;
  for (const k of keys) {
    if (val && typeof val === 'object' && k in val) val = val[k];
    else return fallback;
  }
  if (typeof val !== 'string') return fallback;
  if (params) {
    return val.replace(/\{(\w+)\}/g, (_, k) => params[k] !== undefined ? params[k] : `{${k}}`);
  }
  return val;
}

function applyI18nDOM() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const translated = t(key);
    if (translated !== key) {
      if (el.tagName === 'OPTION') el.textContent = translated;
      else if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = translated;
      else el.textContent = translated;
    }
  });
  const root = document.getElementById('htmlRoot');
  if (root) root.lang = currentLang === 'zh' ? 'zh-CN' : currentLang;
}

function fmtLocale() {
  return currentLang === 'zh' ? 'zh-CN' : 'en-US';
}

async function switchLanguage() {
  const newLang = currentLang === 'zh' ? 'en' : 'zh';
  try {
    const resp = await fetch(`/api/locale/${newLang}`);
    if (!resp.ok) return;
    L = await resp.json();
    currentLang = newLang;
    window.__CRUCIX_LOCALE__ = L;
    window.__CRUCIX_LANG__ = newLang;
    applyI18nDOM();
    updateAll();
  } catch (e) { console.warn('[i18n] Switch failed:', e); }
}

// === DATA ===
let D = {};
// === LAYER DEFINITIONS ===
const LAYER_I18N_KEYS = {
  attack_source: 'layers.attackSources',
  victim:        'layers.victims',
  honeypot:      'layers.honeypots',
  apt:           'layers.aptGroups',
  c2:            'layers.c2Infrastructure',
  exposed_asset: 'layers.exposedAssets',
  cert:          'layers.certAlerts',
  bgp_anomaly:   'layers.bgpAnomalies',
};
const LAYERS = [
  { id:'attack_source', color:'#ff1744', visible:true },
  { id:'victim',        color:'#ff6d00', visible:true },
  { id:'honeypot',      color:'#ffc107', visible:true },
  { id:'apt',           color:'#aa00ff', visible:true },
  { id:'c2',            color:'#b71c1c', visible:true },
  { id:'exposed_asset', color:'#2979ff', visible:true },
  { id:'cert',          color:'#00e676', visible:true },
  { id:'bgp_anomaly',   color:'#ffffff', visible:true },
];
function layerName(layer) { return t(LAYER_I18N_KEYS[layer.id] || layer.id); }

const TYPE_COLORS = {
  attack_source:'#ff1744', victim:'#ff6d00', honeypot:'#ffc107',
  apt:'#aa00ff', c2:'#b71c1c', exposed_asset:'#2979ff',
  cert:'#00e676', bgp_anomaly:'#ffffff'
};

// === GLOBE STATE ===
let globe = null;
let globeInitialized = false;

// === FLAT MAP STATE ===
let flatMapInitialized = false;
let mapMode = 'flat';
let mapZoom = 1;
let mapPanX = 0, mapPanY = 0;
let mapDragging = false, mapDragStartX = 0, mapDragStartY = 0;
let mapImg = null;
let mapImgLoaded = false;

// === WORLD GEO DATA (country borders) ===
let worldGeoData = null;
let worldLandData = null;
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(topo => {
    worldGeoData = topojson.feature(topo, topo.objects.countries);
    worldLandData = topojson.feature(topo, topo.objects.land);
    if(mapMode === 'flat' && flatMapInitialized) drawFlatMap();
  }).catch(() => {});

function drawGeoPolygon(ctx, coords, toX, toY){
  coords.forEach((ring) => {
    ctx.beginPath();
    ring.forEach(([lon, lat], i) => {
      const x = toX(lon), y = toY(lat);
      if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  });
}
function drawGeoFeature(ctx, feature, toX, toY){
  const geom = feature.geometry;
  if(!geom) return;
  if(geom.type === 'Polygon') drawGeoPolygon(ctx, geom.coordinates, toX, toY);
  else if(geom.type === 'MultiPolygon') geom.coordinates.forEach(p => drawGeoPolygon(ctx, p, toX, toY));
}

// === HELPERS ===
function safe(v, fallback){ return v != null ? v : fallback; }
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function fmtTime(ts){
  if(!ts) return '--';
  try{ const d=new Date(ts); return d.toLocaleString(fmtLocale(),{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}); }catch{ return ts; }
}
function threatColor(idx){
  if(idx>=80) return '#ff1744';
  if(idx>=60) return '#ff6d00';
  if(idx>=40) return '#ffc107';
  if(idx>=20) return '#00e676';
  return '#00e5ff';
}

// === FLAT MAP ===
function initFlatMap() {
  if (flatMapInitialized) return;
  const canvas = document.getElementById('flatMap');
  const container = document.getElementById('mapContainer');

  mapImg = new Image();
  mapImg.crossOrigin = 'anonymous';
  mapImg.onload = () => { mapImgLoaded = true; drawFlatMap(); };
  mapImg.src = 'https://unpkg.com/three-globe@2.33.0/example/img/earth-night.jpg';

  function resizeCanvas() {
    const rect = container.getBoundingClientRect();
    const w = Math.max(rect.width, 200);
    const h = Math.min(Math.max(rect.height, 200), window.innerHeight);
    canvas.width = w * devicePixelRatio;
    canvas.height = h * devicePixelRatio;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    if (mapMode === 'flat') drawFlatMap();
  }
  setTimeout(resizeCanvas, 100);
  window.addEventListener('resize', resizeCanvas);
  new ResizeObserver(() => resizeCanvas()).observe(container);

  canvas.addEventListener('mousedown', e => {
    mapDragging = true;
    mapDragStartX = e.clientX - mapPanX;
    mapDragStartY = e.clientY - mapPanY;
    canvas.style.cursor = 'grabbing';
  });
  canvas.addEventListener('mousemove', e => {
    if (!mapDragging) return;
    mapPanX = e.clientX - mapDragStartX;
    mapPanY = e.clientY - mapDragStartY;
    drawFlatMap();
  });
  canvas.addEventListener('mouseup', () => { mapDragging = false; canvas.style.cursor = 'crosshair'; });
  canvas.addEventListener('mouseleave', () => { mapDragging = false; canvas.style.cursor = 'crosshair'; });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    mapZoom = Math.max(0.5, Math.min(6, mapZoom * delta));
    drawFlatMap();
  }, { passive: false });

  document.getElementById('zoomIn').addEventListener('click', () => {
    mapZoom = Math.min(6, mapZoom * 1.3);
    drawFlatMap();
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    mapZoom = Math.max(0.5, mapZoom / 1.3);
    drawFlatMap();
  });
  document.getElementById('mapReset').addEventListener('click', () => {
    mapZoom = 1; mapPanX = 0; mapPanY = 0;
    drawFlatMap();
    if(globe) globe.pointOfView({lat:25,lng:30,altitude:2.2}, 800);
    document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
    const worldBtn = document.querySelector('.region-btn[data-region="global"]');
    if(worldBtn) worldBtn.classList.add('active');
  });

  flatMapInitialized = true;
}

function drawFlatMap() {
  if (mapMode !== 'flat') return;
  const canvas = document.getElementById('flatMap');
  const ctx = canvas.getContext('2d');
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

  ctx.fillStyle = '#060610';
  ctx.fillRect(0, 0, W, H);

  function toX(lon) {
    const dw = W * mapZoom;
    const dx = mapPanX + (W - dw) / 2;
    return dx + ((lon + 180) / 360) * dw;
  }
  function toY(lat) {
    const dh = H * mapZoom;
    const dy = mapPanY + (H - dh) / 2;
    return dy + ((90 - lat) / 180) * dh;
  }

  // Draw country polygons (dark political map style)
  if(worldGeoData && worldGeoData.features){
    ctx.fillStyle = 'rgba(18,22,32,0.95)';
    ctx.strokeStyle = 'rgba(80,100,120,0.35)';
    ctx.lineWidth = 0.6;
    worldGeoData.features.forEach(f => drawGeoFeature(ctx, f, toX, toY));
  } else if (mapImgLoaded && mapImg) {
    const dw = W * mapZoom, dh = H * mapZoom;
    const dx = mapPanX + (W - dw) / 2, dy = mapPanY + (H - dh) / 2;
    ctx.globalAlpha = 0.5;
    ctx.drawImage(mapImg, dx, dy, dw, dh);
    ctx.globalAlpha = 1;
  }

  // Subtle graticule grid
  ctx.strokeStyle = 'rgba(0,229,255,0.04)';
  ctx.lineWidth = 0.3;
  for (let lon = -180; lon <= 180; lon += 30) {
    const x = toX(lon);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let lat = -90; lat <= 90; lat += 30) {
    const y = toY(lat);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  const geo = D.geoAttacks || [];
  const visibleTypes = new Set(LAYERS.filter(l => l.visible).map(l => l.id));
  const visible = geo.filter(p => visibleTypes.has(p.type));

  const sources = visible.filter(p => p.type === 'attack_source');
  const victims = visible.filter(p => p.type === 'victim');
  const c2s = visible.filter(p => p.type === 'c2');

  const drawArc = (from, to, color, width) => {
    const x1 = toX(from.lon), y1 = toY(from.lat);
    const x2 = toX(to.lon), y2 = toY(to.lat);
    const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    if(dist < 5) return;
    const cpx = (x1 + x2) / 2;
    const cpy = Math.min(y1, y2) - dist * 0.2;
    ctx.lineWidth = width || 1.5;
    ctx.strokeStyle = color;
    ctx.shadowColor = color.replace(/[\d.]+\)$/, '0.6)');
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cpx, cpy, x2, y2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  };

  // C2 → victim arcs (dark red)
  if(visibleTypes.has('c2') && visibleTypes.has('victim')){
    c2s.slice(0,10).forEach(c2 => {
      victims.slice(0,4).forEach(vic => {
        drawArc(c2, vic, 'rgba(183,28,28,0.4)', 1);
      });
    });
  }
  // attack_source → victim arcs (red gradient)
  if(visibleTypes.has('attack_source') && visibleTypes.has('victim')){
    sources.forEach(src => {
      victims.slice(0,5).forEach(vic => {
        drawArc(src, vic, 'rgba(255,23,68,0.5)', 1.5);
      });
    });
  }
  // CERT alert arcs (green, connecting CERT locations)
  const certs = visible.filter(p => p.type === 'cert');
  if(visibleTypes.has('cert') && certs.length >= 2){
    for(let i=0;i<Math.min(certs.length-1,8);i++){
      drawArc(certs[i], certs[i+1], 'rgba(0,230,118,0.3)', 0.8);
    }
  }

  let labelCount = 0;
  visible.forEach(pt => {
    const x = toX(pt.lon);
    const y = toY(pt.lat);
    if (x < -20 || x > W + 20 || y < -20 || y > H + 20) return;

    const color = TYPE_COLORS[pt.type] || '#ffffff';
    const sev = (pt.severity || '').toLowerCase();
    const baseR = sev === 'critical' ? 5 : sev === 'high' ? 4 : sev === 'medium' ? 3 : 2.5;
    const zr = baseR * Math.sqrt(mapZoom);

    // Radial gradient glow (hex→rgba)
    const hexToRgba = (hex, a) => {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    };
    const grad = ctx.createRadialGradient(x, y, 0, x, y, zr * 4);
    grad.addColorStop(0, hexToRgba(color, 1));
    grad.addColorStop(0.3, hexToRgba(color, 0.5));
    grad.addColorStop(1, hexToRgba(color, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, zr * 4, 0, Math.PI * 2);
    ctx.fill();

    // Bright core
    ctx.fillStyle = color;
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(x, y, zr, 0, Math.PI * 2);
    ctx.fill();

    // Inner highlight
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(x, y, zr * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    if (sev === 'critical' && labelCount < 15) {
      ctx.fillStyle = 'rgba(224,230,237,0.85)';
      ctx.font = `${Math.max(7, 8 * Math.sqrt(mapZoom))}px "JetBrains Mono", monospace`;
      ctx.fillText((pt.label || '').substring(0, 25), x + zr + 4, y + 3);
      labelCount++;
    } else if (sev === 'high' && mapZoom >= 1.5 && labelCount < 25) {
      ctx.fillStyle = 'rgba(224,230,237,0.6)';
      ctx.font = `${Math.max(7, 7 * Math.sqrt(mapZoom))}px "JetBrains Mono", monospace`;
      ctx.fillText((pt.label || '').substring(0, 20), x + zr + 4, y + 3);
      labelCount++;
    }
  });

  const arcsCount = sources.length * Math.min(victims.length, 5) + Math.min(c2s.length, 8) * Math.min(victims.length, 3);
  document.getElementById('globeStats').textContent = `${visible.length} ${t('map.markers')} \u00b7 ${arcsCount} ${t('map.arcs')} \u00b7 ${t('map.scrollToZoom')}`;
}

// === BOOT SEQUENCE ===
function runBoot(){
  const logo = document.getElementById('bootLogo');
  const lines = document.getElementById('bootLines');
  const final = document.getElementById('bootFinal');

  const steps = L.boot?.steps || [];
  const bootSteps = steps.map(s => [s, 'ok']);

  logo.style.opacity = '1';
  logo.style.transition = 'opacity 0.6s';

  setTimeout(() => {
    lines.style.opacity = '1';
    lines.style.transition = 'opacity 0.3s';
    let i = 0;
    const iv = setInterval(() => {
      if(i >= bootSteps.length){ clearInterval(iv); finishBoot(); return; }
      const [text, status] = bootSteps[i];
      const cls = status === 'ok' ? 'ok' : status === 'warn' ? 'warn' : 'fail';
      const tag = status === 'ok' ? '  OK' : status === 'warn' ? 'WARN' : 'FAIL';
      lines.innerHTML += `<span class="${cls}">[${tag}]</span> ${esc(text)}\n`;
      i++;
    }, 250);
  }, 400);

  function finishBoot(){
    const h = (D.health||[]);
    const ok = h.filter(s=>!s.err&&!s.stale).length;
    lines.innerHTML += `<span class="ok">[${ok}/${h.length||'?'}]</span> ${t('boot.sourcesOnline')}\n`;
    final.style.opacity = '1';
    final.style.transition = 'opacity 0.4s';
    setTimeout(() => {
      document.getElementById('boot').style.transition = 'opacity 0.5s';
      document.getElementById('boot').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('boot').style.display = 'none';
        document.getElementById('main').style.opacity = '1';
        document.getElementById('main').style.transition = 'opacity 0.5s';
        if (mapMode === 'globe') { initGlobe(); } else { initFlatMap(); drawFlatMap(); }
      }, 500);
    }, 800);
  }
}

// === 3D GLOBE ===
function initGlobe(){
  if(globeInitialized && globe) return;
  const container = document.getElementById('mapContainer');
  const w = container.clientWidth;
  const h = container.clientHeight || 500;

  globe = Globe()
    .width(w)
    .height(h)
    .globeImageUrl('//unpkg.com/three-globe@2.33.0/example/img/earth-dark.jpg')
    .bumpImageUrl('//unpkg.com/three-globe@2.33.0/example/img/earth-topology.png')
    .globeMaterial(new THREE.MeshPhongMaterial({color:0x0a0e18,opacity:0.95,transparent:true}))
    .backgroundImageUrl('')
    .backgroundColor('rgba(0,0,0,0)')
    .atmosphereColor('#00e5ff')
    .atmosphereAltitude(0.18)
    .showGraticules(true)
    .pointAltitude(d => d.alt || 0.01)
    .pointRadius(d => d.size || 0.3)
    .pointColor(d => d.color)
    .pointLabel(d => `<b style="color:${d.color}">${esc(d.label||'')}</b><br><span style="opacity:0.7;font-size:10px">${esc(d.source||'')} · ${esc(d.severity||'')}</span>`)
    .onPointHover(pt => { document.getElementById('globeViz').style.cursor = pt ? 'pointer' : 'grab'; })
    .onPointClick((pt, ev) => {
      if(!pt) return;
      const wrapper = document.getElementById('mapContainer');
      const wRect = wrapper.getBoundingClientRect();
      showMapPopup({type:pt.type,label:pt.label,severity:pt.severity,source:pt.source,lat:pt.lat,lon:pt.lng}, ev.clientX - wRect.left, ev.clientY - wRect.top);
    })
    .arcColor(d => d.color)
    .arcStroke(d => d.stroke || 0.4)
    .arcDashLength(0.4)
    .arcDashGap(0.2)
    .arcDashAnimateTime(2000)
    .arcAltitudeAutoScale(0.3)
    .arcLabel(d => d.label || '')
    .ringColor(d => t => {
      const c = d.ringColor || '255,23,68';
      return `rgba(${c},${1-t})`;
    })
    .ringMaxRadius(d => d.maxR || 3)
    .ringPropagationSpeed(d => d.speed || 2)
    .ringRepeatPeriod(d => d.period || 1200)
    (document.getElementById('globeViz'));

  const scene = globe.scene();
  const renderer = globe.renderer();
  renderer.setClearColor(0x000000, 0);

  // Stars
  const starGeom = new THREE.BufferGeometry();
  const sv = [];
  for(let i=0;i<1500;i++){
    const r=700+Math.random()*300;
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    sv.push(r*Math.sin(phi)*Math.cos(theta),r*Math.sin(phi)*Math.sin(theta),r*Math.cos(phi));
  }
  starGeom.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(starGeom,new THREE.PointsMaterial({color:0x4488aa,size:0.7,transparent:true,opacity:0.5})));

  // Graticule color
  scene.traverse(obj => {
    if(obj.material && obj.type === 'Line'){
      obj.material.color.set(0x0a1a2a);
      obj.material.opacity = 0.2;
      obj.material.transparent = true;
    }
  });

  globe.pointOfView({lat:25,lng:30,altitude:2.2},0);
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.25;
  globe.controls().enableDamping = true;
  globe.controls().dampingFactor = 0.1;

  let rotateTimeout;
  const el = document.getElementById('globeViz');
  el.addEventListener('mousedown', () => {
    globe.controls().autoRotate = false;
    clearTimeout(rotateTimeout);
  });
  el.addEventListener('mouseup', () => {
    rotateTimeout = setTimeout(() => { if(globe) globe.controls().autoRotate = true; }, 12000);
  });

  globeInitialized = true;

  // Add country borders to globe
  if(worldGeoData){
    globe.polygonsData(worldGeoData.features)
      .polygonCapColor(() => 'rgba(12,16,24,0.7)')
      .polygonSideColor(() => 'rgba(0,229,255,0.03)')
      .polygonStrokeColor(() => 'rgba(80,100,120,0.4)')
      .polygonAltitude(0.005);
  } else {
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(r=>r.json()).then(topo=>{
        const geo = topojson.feature(topo, topo.objects.countries);
        if(!worldGeoData) worldGeoData = geo;
        globe.polygonsData(geo.features)
          .polygonCapColor(() => 'rgba(12,16,24,0.7)')
          .polygonSideColor(() => 'rgba(0,229,255,0.03)')
          .polygonStrokeColor(() => 'rgba(80,100,120,0.4)')
          .polygonAltitude(0.005);
      }).catch(()=>{});
  }

  plotGlobeMarkers();
  renderGlobeLegend();

  window.addEventListener('resize', () => {
    if(!globe) return;
    globe.width(container.clientWidth);
    globe.height(container.clientHeight);
  });
}

function plotGlobeMarkers(){
  if(!globe) return;
  const geo = D.geoAttacks || [];
  const visibleTypes = new Set(LAYERS.filter(l=>l.visible).map(l=>l.id));

  const points = [];
  const rings = [];
  const arcs = [];

  const sources = [];
  const victims = [];

  geo.forEach(pt => {
    if(!visibleTypes.has(pt.type)) return;
    const color = TYPE_COLORS[pt.type] || '#ffffff';
    const sev = (pt.severity||'').toLowerCase();
    const sizeMul = sev === 'critical' ? 1.6 : sev === 'high' ? 1.2 : sev === 'medium' ? 0.9 : 0.6;
    points.push({
      lat: pt.lat, lng: pt.lon, size: 0.25 * sizeMul, alt: 0.01,
      color, label: pt.label, source: pt.source, severity: pt.severity, type: pt.type
    });

    if(sev === 'critical'){
      const rgb = color === '#ff1744' ? '255,23,68' :
                  color === '#ff6d00' ? '255,109,0' :
                  color === '#aa00ff' ? '170,0,255' : '255,255,255';
      rings.push({ lat:pt.lat, lng:pt.lon, maxR:4, speed:2, period:1000, ringColor:rgb });
    }

    if(pt.type === 'attack_source') sources.push(pt);
    if(pt.type === 'victim') victims.push(pt);
  });

  const c2s = [];
  const certs = [];

  geo.forEach(pt => {
    if(pt.type === 'c2') c2s.push(pt);
    if(pt.type === 'cert') certs.push(pt);
  });

  // Attack arcs: attack_source → victim (red gradient)
  if(visibleTypes.has('attack_source') && visibleTypes.has('victim')){
    sources.forEach(src => {
      victims.slice(0,5).forEach(vic => {
        arcs.push({
          startLat:src.lat, startLng:src.lon,
          endLat:vic.lat, endLng:vic.lon,
          color:['rgba(255,23,68,0.7)','rgba(255,109,0,0.5)'],
          stroke:0.4, label:`${src.label||'?'} → ${vic.label||'?'}`
        });
      });
    });
  }

  // C2 arcs: c2 → victim (dark red, thinner)
  if(visibleTypes.has('c2') && visibleTypes.has('victim')){
    c2s.slice(0,8).forEach(c2 => {
      victims.slice(0,3).forEach(vic => {
        arcs.push({
          startLat:c2.lat, startLng:c2.lon,
          endLat:vic.lat, endLng:vic.lon,
          color:['rgba(183,28,28,0.5)','rgba(255,109,0,0.3)'],
          stroke:0.2, label:`C2 → ${vic.label||'?'}`
        });
      });
    });
  }

  // CERT alert arcs: cert → cert (green pulse lines between advisory centers)
  if(visibleTypes.has('cert') && certs.length >= 2){
    for(let i=0;i<Math.min(certs.length-1,6);i++){
      arcs.push({
        startLat:certs[i].lat, startLng:certs[i].lon,
        endLat:certs[i+1].lat, endLng:certs[i+1].lon,
        color:['rgba(0,230,118,0.3)','rgba(0,229,255,0.2)'],
        stroke:0.15, label:`${certs[i].source||''} ↔ ${certs[i+1].source||''}`
      });
    }
  }

  globe.pointsData(points);
  globe.ringsData(rings);
  globe.arcsData(arcs);
}

function renderGlobeLegend(){

  leg.innerHTML = LAYERS.map(l =>

// === MAP POPUP SYSTEM ===
let flatMapMarkerIndex = [];
function buildMarkerIndex(){
  const canvas = document.getElementById('flatMap');
  if(!canvas) return;
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  const geo = D.geoAttacks || [];
  const visibleTypes = new Set(LAYERS.filter(l => l.visible).map(l => l.id));
  flatMapMarkerIndex = geo.filter(p => visibleTypes.has(p.type)).map(pt => {
    const dw = W * mapZoom, dh = H * mapZoom;
    const dx = mapPanX + (W - dw) / 2, dy = mapPanY + (H - dh) / 2;
    return { x: dx + ((pt.lon + 180) / 360) * dw, y: dy + ((90 - pt.lat) / 180) * dh, data: pt };
  });
}

function initTabs(){
  const area = document.getElementById('bottomArea');
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const wasActive = btn.classList.contains('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      if(wasActive){
        area.classList.remove('expanded');
        return;
      }
      btn.classList.add('active');
      area.classList.add('expanded');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if(btn.dataset.tab === 'cve') setTimeout(drawCveTimeline, 60);
      if(btn.dataset.tab === 'attack') setTimeout(drawAttackHeatmap, 60);
    });
  });
}

// Tab 1: CVE Timeline scatter plot
function drawCveTimeline(){
  const canvas = document.getElementById('cveCanvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = rect.width, H = rect.height;

  ctx.fillStyle = 'rgba(10,10,15,0.95)';
  ctx.fillRect(0,0,W,H);

  const cves = (D.cves && D.cves.recent) || [];
  if(!cves.length){
    ctx.fillStyle = '#5a6a7a';
    ctx.font = '12px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(t('emptyStates.noCveData'), W/2, H/2);
    return;
  }

  const pad = {top:25, right:20, bottom:30, left:50};
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  const dates = cves.map(c => new Date(c.publishedDate || Date.now()).getTime());
  const minDate = Math.min(...dates);
  const maxDate = Math.max(...dates);
  const dateRange = maxDate - minDate || 86400000;

  // Axes
  ctx.strokeStyle = 'rgba(0,229,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, pad.top + ph);
  ctx.lineTo(pad.left + pw, pad.top + ph);
  ctx.stroke();

  // Y-axis labels (CVSS 0-10)
  ctx.fillStyle = '#5a6a7a';
  ctx.font = '9px "JetBrains Mono"';
  ctx.textAlign = 'right';
  for(let i = 0; i <= 10; i += 2){
    const y = pad.top + ph - (i / 10) * ph;
    ctx.fillText(i.toString(), pad.left - 6, y + 3);
    if(i > 0){
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + pw, y); ctx.stroke();
    }
  }

  // Y label
  ctx.save();
  ctx.translate(12, pad.top + ph/2);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#5a6a7a';
  ctx.font = '9px "JetBrains Mono"';
  ctx.fillText(t('cveTimeline.cvss'), 0, 0);
  ctx.restore();

  // X label
  ctx.textAlign = 'center';
  ctx.fillText(t('cveTimeline.publishedDate'), pad.left + pw/2, H - 4);

  // Dots
  cves.forEach(c => {
    const cvss = parseFloat(c.cvss) || 0;
    const epss = parseFloat(c.epss) || 0;
    const t = new Date(c.publishedDate || Date.now()).getTime();

    const x = pad.left + ((t - minDate) / dateRange) * pw;
    const y = pad.top + ph - (cvss / 10) * ph;
    const r = Math.max(3, Math.min(12, epss * 40));

    let color;
    if(c.inKEV) color = '#ff1744';
    else if(c.hasPoc) color = '#ff6d00';
    else color = '#5a6a7a';

    ctx.globalAlpha = 0.7;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    if(c.inKEV){
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#ff1744';
      ctx.beginPath();
      ctx.arc(x, y, r + 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  // Legend
  const legX = pad.left + 10;
  const legY = pad.top + 8;
  ctx.font = '9px "JetBrains Mono"';
  [['#ff1744',t('cveTimeline.inKev')],['#ff6d00',t('cveTimeline.hasPoc')],['#5a6a7a',t('cveTimeline.other')]].forEach(([col,lbl],i) => {
    const ox = legX + i * 80;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(ox, legY, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a9aaa';
    ctx.textAlign = 'left';
    ctx.fillText(lbl, ox + 8, legY + 3);
  });
}

// Tab 2: ATT&CK Heatmap
function drawAttackHeatmap(){
  const canvas = document.getElementById('attackCanvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = rect.width, H = rect.height;

  ctx.fillStyle = 'rgba(10,10,15,0.95)';
  ctx.fillRect(0,0,W,H);

  const matrix = D.attackMatrix || {};
  const tactics = matrix.tactics || [];
  const techniques = matrix.techniques || [];

  if(!tactics.length){
    ctx.fillStyle = '#5a6a7a';
    ctx.font = '12px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(t('emptyStates.noAttackData'), W/2, H/2);
    return;
  }

  const pad = {top:10, right:10, bottom:50, left:10};
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;
  const cols = tactics.length;
  const cellW = Math.min(pw / cols, 100);
  const startX = pad.left + (pw - cellW * cols) / 2;

  // group techniques by tactic
  const tacticMap = {};
  tactics.forEach(t => { tacticMap[t.id] = { name:t.name, count:t.techniqueCount||0 }; });

  const maxCount = Math.max(1, ...tactics.map(t => t.techniqueCount || 0));
  const rows = 8;
  const cellH = Math.min(ph / rows, 28);
  const startY = pad.top + (ph - cellH * rows) / 2;

  tactics.forEach((tac, ci) => {
    const intensity = (tac.techniqueCount || 0) / maxCount;
    for(let ri = 0; ri < rows; ri++){
      const rowInt = intensity * (1 - ri * 0.1);
      const alpha = Math.max(0.03, Math.min(1, rowInt));
      const x = startX + ci * cellW;
      const y = startY + ri * cellH;

      if(rowInt > 0.6) ctx.fillStyle = `rgba(255,23,68,${alpha})`;
      else if(rowInt > 0.3) ctx.fillStyle = `rgba(255,109,0,${alpha * 0.8})`;
      else ctx.fillStyle = `rgba(0,229,255,${alpha * 0.4})`;

      ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
    }

    // Tactic label
    ctx.save();
    ctx.translate(startX + ci * cellW + cellW/2, startY + rows * cellH + 8);
    ctx.rotate(-Math.PI/4);
    ctx.fillStyle = '#8a9aaa';
    ctx.font = '8px "JetBrains Mono"';
    ctx.textAlign = 'right';
    const name = (tac.name||'').length > 16 ? (tac.name||'').slice(0,14)+'..' : (tac.name||'');
    ctx.fillText(name, 0, 0);
    ctx.restore();

    // Count label on top
    ctx.fillStyle = '#00e5ff';
    ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(String(tac.techniqueCount||0), startX + ci * cellW + cellW/2, startY - 3);
  });
}

function renderSignals(){
  const el = document.getElementById('signalsList');
  if(!el) return;
  const delta = D.delta || {};
  const correlated = (delta.signals && delta.signals.correlated) || [];
  const atomic = (delta.signals && delta.signals.atomic) || [];
  if(!correlated.length && !atomic.length){
    const geo = D.geoAttacks || [];
    const iocs = D.iocs || {};
    const cves = D.cves || {};
    const generated = [];
    if(safe(cves.kevCount,0)>0) generated.push({level:'CRITICAL',name:t('signal.kevExploits','Active KEV Exploits Detected'),desc:t('signal.kevExploitsDesc',`${cves.kevCount} vulnerabilities in CISA KEV catalog actively exploited in the wild. Immediate patching recommended.`,{count:cves.kevCount})});

    const attackSources = geo.filter(p=>p.type==='attack_source');
    if(attackSources.length>0) generated.push({level:'HIGH',name:t('signal.attackSources','Attack Sources')+`: ${attackSources.length} `+t('signal.originsDetected','Origins Detected'),desc:t('signal.attackSourcesDesc',`Geographic attack sources identified from ${[...new Set(attackSources.map(a=>a.source))].join(', ')}.`)});
    const aptCount = ((D.actors||{}).ransomwareGroups||[]).length;
    if(aptCount>0) generated.push({level:'MEDIUM',name:`${aptCount} `+t('signal.activeGroups','Active Threat Groups Tracked'),desc:t('signal.activeGroupsDesc','Ransomware and APT groups with recent victim claims. Cross-reference with your sector exposure.')});
    if(safe(iocs.phishCount,0)>0) generated.push({level:'MEDIUM',name:t('signal.phishing','Phishing Campaign Indicators'),desc:t('signal.phishingDesc',`${iocs.phishCount} phishing URLs detected. Review email gateway logs and user reports.`,{count:iocs.phishCount})});

      el.innerHTML += `<div class="signal-card"><div class="signal-hdr"><span class="signal-num">${t('signal.label','SIGNAL')} ${i+1}</span><span class="signal-lvl ${s.level.toLowerCase()}">${s.level}</span></div><div class="signal-title">${esc(s.name)}</div><div class="signal-body">${esc(s.desc)}</div></div>`;

  let idx=0;

    el.innerHTML += `<div class="signal-card"><div class="signal-hdr"><span class="signal-num">${t('signal.label','SIGNAL')} ${idx}</span><span class="signal-lvl ${lvl}">${esc(s.level||'')}</span></div><div class="signal-title">${esc(s.name||'')}</div><div class="signal-body">${esc(s.description||s.reason||'')}</div></div>`;
  });
  atomic.filter(s=>s.level==='CRITICAL'||s.level==='HIGH').slice(0,4).forEach(s=>{
    idx++;
    const lvl=(s.level||'MEDIUM').toLowerCase();
    el.innerHTML += `<div class="signal-card"><div class="signal-hdr"><span class="signal-num">${t('signal.label','SIGNAL')} ${idx}</span><span class="signal-lvl ${lvl}">${esc(s.level)}</span></div><div class="signal-title">${esc(s.label||'')}: ${s.previous??'?'} → ${s.current}</div><div class="signal-body">${esc(s.direction==='escalated'?t('signal.escalated','Escalated since last sweep'):t('signal.detected','Detected in current sweep'))}</div></div>`;
  });
}

// === SWEEP DELTA ===
function renderSweepDelta(){
  const el = document.getElementById('sweepDelta');
  if(!el) return;
  const delta = D.delta || {};
  const summary = delta.summary || {};
  const badge = document.getElementById('sweepDeltaBadge');
  if(badge){
    const dir = summary.direction || delta.direction || 'stable';
    badge.textContent = '◆ ' + dir.toUpperCase();
    badge.className = 'sh-badge';
  }
  const lines = [];
  if(summary.totalSignals!=null) lines.push(`<span class="sw-label">${t('delta.newSignals','Signals')}:</span> ${summary.totalSignals} (${summary.criticalCount||0}${t('delta.critical','C')} / ${summary.highCount||0}H / ${summary.mediumCount||0}M)`);
  if(summary.newSources!=null||summary.failedSources!=null) lines.push(`<span class="sw-label">${t('dashboard.sources','Sources')}:</span> <span class="sw-new">${summary.newSources||0} ${t('delta.new','new')}</span> · <span class="sw-gone">${summary.failedSources||0} ${t('delta.failed','failed')}</span>`);
  if(delta.overallLevel) lines.push(`<span class="sw-label">${t('threats.level','Level')}:</span> ${delta.overallLevel} (${delta.threatIndex||'?'}/100)`);
  const esc_sigs = (delta.signals?.atomic||[]).filter(s=>s.direction==='escalated').slice(0,3);
  esc_sigs.forEach(s=>{ lines.push(`<span class="sw-esc">▲</span> ${esc(s.label)}: ${s.previous??'?'} → ${s.current}`); });
  if(!lines.length) lines.push(t('sweep.awaiting','Awaiting sweep data...'));
  el.innerHTML = lines.map(l=>`<div class="sweep-item">${l}</div>`).join('');
}

// === SECURITY NEWS CARDS ===
function renderNewsCards(){
  const el = document.getElementById('newsGrid');
  if(!el) return;
  const news = (D.securityNews||[]).concat(D.newsFeed||[]).slice(0,20);
  document.getElementById('newsCount').textContent = news.length + ' ' + t('badges.items','ITEMS');
  if(!news.length){ el.innerHTML=`<div style="padding:16px;color:var(--dim);font-size:11px;grid-column:1/-1">${t('emptyStates.awaitingFeed','Awaiting news data...')}</div>`; return; }
  const srcColors = { 'CISA':'var(--red)','NVD':'var(--orange)','ENISA':'var(--yellow)','FreeBuf':'var(--green)','Anquanke':'var(--accent)','4hou':'var(--blue)','Reddit':'var(--orange)','Bluesky':'var(--blue)','CNCERT':'var(--green)','OTX':'var(--purple)' };
  el.innerHTML = news.map(n => {
    const src = n.source || 'Unknown';
    const color = srcColors[src] || 'var(--dim)';
    const url = n.url || '';
    return `<div class="news-card${url?' clickable':''}">
      ${url?`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer" style="display:contents;text-decoration:none;color:inherit">`:''}
      <div><span class="news-src" style="background:${color}20;color:${color};border:1px solid ${color}40">${esc(src)}</span><span class="news-time">${fmtTime(n.date||n.timestamp)}</span></div>
      <div class="news-text">${esc(n.title||n.headline||'')}</div>
      ${url?`</a>`:''}
    </div>`;
  }).join('');
}

// === CVE TRENDS ===
function renderCveTrends(){
  const el = document.getElementById('trendGrid');
  if(!el) return;
  const cves = D.cves || {};
  const recent = cves.recent || [];
  const avgCvss = recent.length ? (recent.reduce((s,c)=>s+(parseFloat(c.cvss)||0),0)/recent.length).toFixed(1) : '--';
  const withPoc = recent.filter(c=>c.hasPoc).length;
  const withKev = recent.filter(c=>c.inKEV).length;
  const stats = [
    { val:safe(cves.totalTracked, recent.length), label:t('cveTrend.totalTracked','Total Tracked'), cls:'', url:'' },
    { val:safe(cves.criticalCount,0), label:t('threats.critical','Critical'), cls:'red', url:'https://nvd.nist.gov/vuln/search/results?form_type=Basic&results_type=overview&query=&search_type=all&cvss_version=3&cvss_v3_severity=CRITICAL' },
    { val:safe(cves.kevCount,0), label:t('cveTimeline.inKev','In KEV'), cls:'red', url:'https://www.cisa.gov/known-exploited-vulnerabilities-catalog' },
    { val:withPoc, label:t('cveTimeline.hasPoc','Has PoC'), cls:'orange', url:'' },
    { val:avgCvss, label:t('cveTrend.avgCvss','Avg CVSS'), cls:parseFloat(avgCvss)>=7?'red':parseFloat(avgCvss)>=4?'orange':'green', url:'' },
    { val:recent.length, label:t('cveTrend.recent7d','Recent (7d)'), cls:'', url:'' },
  ];
  el.innerHTML = stats.map(s => `<div class="trend-stat${s.url?' clickable':''}">
    ${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer" style="display:contents;text-decoration:none;color:inherit">`:''}
    <div class="ts-val ${s.cls}">${s.val}</div><div class="ts-label">${s.label}</div>
    ${s.url?`</a>`:''}
  </div>`).join('');
}

// === NEWS TICKER ===
function renderTicker(){
  const track = document.getElementById('tickerContent');
  if(!track) return;
  const feed = (D.newsFeed || []).slice(0, 30);
  if(!feed.length){
    track.innerHTML = `<span class="ticker-item" style="color:var(--dim)">${esc(t('emptyStates.awaitingFeed'))}</span>`;
    return;
  }
  track.innerHTML = feed.map(item => {
    const lvl = (item.level||'low').toLowerCase();
    const sevCls = lvl === 'critical' ? 'crit' : lvl === 'high' ? 'high' : lvl === 'medium' ? 'med' : 'low';
    return `<span class="ticker-item"><span class="t-sev ${sevCls}">[${(lvl||'info').toUpperCase()}]</span> ${esc(item.headline||item.title||'')}</span>`;
  }).join('');

  const clone = track.innerHTML;
  track.innerHTML += clone;
}

  if (mapMode === 'flat') drawFlatMap(); else plotGlobeMarkers();

  renderLlmBrief();
  renderTicker();
  buildMarkerIndex();

  const activeTab = document.querySelector('.tab-btn.active');
  if(activeTab && document.getElementById('bottomArea')){
    if(activeTab.dataset.tab === 'cve') drawCveTimeline();
    if(activeTab.dataset.tab === 'attack') drawAttackHeatmap();
  }
  // Update health badge
  const h = D.health || [];
  const hOk = h.filter(s=>!s.err&&!s.stale).length;

// === SSE ===
function connectSSE(){
  if(typeof EventSource === 'undefined') return;
  if(location.protocol === 'file:') return;

  const es = new EventSource('/events');
  es.onmessage = (e) => {
    try{
      const msg = JSON.parse(e.data);
      if(msg.type === 'update' && msg.data){
        D = msg.data;
        updateAll();
        const topbar = document.querySelector('.topbar');
        if(topbar){
          topbar.style.borderColor = 'var(--accent)';
          setTimeout(() => topbar.style.borderColor = '', 1500);
        }
        const sp = document.getElementById('sweepPill');
        if(sp) sp.classList.remove('active');
      } else if(msg.type === 'sweep_start'){
        const ts = document.getElementById('metaTs');
        if(ts) ts.textContent = t('badges.sweeping');
        const sp = document.getElementById('sweepPill');
        if(sp) sp.classList.add('active');
        const st = document.getElementById('sweepText');
        if(st) st.textContent = 'SWEEPING...';
      }
    }catch{}
  };
  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 5000);
  };
}

  US:{lat:38,lng:-97,altitude:1.3},

};

// === FLAT MAP CLICK (popup) ===
document.getElementById('flatMap').addEventListener('click', e => {
  if(mapDragging) return;
  const canvas = document.getElementById('flatMap');
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left);
  const my = (e.clientY - rect.top);
  buildMarkerIndex();
  let closest = null, closestDist = 15;
  flatMapMarkerIndex.forEach(m => {
    const d = Math.sqrt((m.x - mx)**2 + (m.y - my)**2);
    if(d < closestDist){ closestDist = d; closest = m; }
  });
  if(closest){
    showMapPopup(closest.data, mx, my);
  } else {
    hideMapPopup();
  }
});
document.getElementById('popupClose').addEventListener('click', hideMapPopup);

// === MODE TOGGLE ===
document.getElementById('btnFlat').addEventListener('click', () => {
  if (mapMode === 'flat') return;
  mapMode = 'flat';
  document.getElementById('btnFlat').classList.add('active');
  document.getElementById('btnGlobe').classList.remove('active');
  document.getElementById('flatMap').style.display = 'block';
  document.getElementById('globeViz').style.display = 'none';
  document.getElementById('mapZoom').style.display = 'flex';
  initFlatMap();
  drawFlatMap();
});

document.getElementById('btnGlobe').addEventListener('click', () => {
  if (mapMode === 'globe') return;
  mapMode = 'globe';
  document.getElementById('btnGlobe').classList.add('active');
  document.getElementById('btnFlat').classList.remove('active');
  document.getElementById('flatMap').style.display = 'none';
  document.getElementById('globeViz').style.display = 'block';
  document.getElementById('mapZoom').style.display = 'none';
  initGlobe();
  plotGlobeMarkers();
});

// === LANGUAGE SWITCH ===
document.getElementById('langSwitch').addEventListener('click', switchLanguage);

// === INIT ===
let booted = false;
function init(){
  applyI18nDOM();
  initTabs();
  updateAll();
  if(!booted){ runBoot(); booted = true; }
  // Redraw canvas panels on resize
  window.addEventListener('resize', () => {
    const activeTab = document.querySelector('.tab-btn.active');
    if(activeTab){
      if(activeTab.dataset.tab === 'cve') requestAnimationFrame(drawCveTimeline);
      if(activeTab.dataset.tab === 'attack') requestAnimationFrame(drawAttackHeatmap);
    }
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  const hasInlineData = !!(D && D.meta);
  const canProbeApi = location.protocol !== 'file:';

  // Auto-load locale if needed (default zh)
  if(canProbeApi && currentLang && !L.sidebar){
    try {
      const lr = await fetch(`/api/locale/${currentLang}`);
      if(lr.ok){ L = await lr.json(); window.__CRUCIX_LOCALE__ = L; }
    } catch{}
  }

  if(canProbeApi){
    if(hasInlineData) init();
    fetch('/api/data')
      .then(r => r.json())
      .then(data => { D = data; init(); connectSSE(); })
      .catch(() => {
        if(!hasInlineData) init();
        connectSSE();
      });
  } else {
    init();
  }
});
